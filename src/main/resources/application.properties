spring.application.name=skylink-media-service
server.port=8085
spring.datasource.url=jdbc:postgresql://localhost:5432/skylink_media_service
# 
# spring.datasource.username=mhcybroot
# spring.datasource.password=MhR@2025
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Thymeleaf settings
spring.thymeleaf.cache=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:skylink-default-secret-key-change-in-production-256-bits-minimum-required-for-hs256}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method