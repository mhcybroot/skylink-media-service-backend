<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('Create Contractor')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('create-contractor')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header th:replace="~{fragments/super-admin-layout :: header('Create Contractor', '/super-admin/create-contractor')}"></header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-xl mx-auto space-y-6 pb-12">

                <!-- Flash Messages -->
                <div th:replace="~{fragments/super-admin-layout :: flash-messages}"></div>

                <div class="saas-card p-6 sm:p-8">
                    <form th:action="@{/super-admin/create-contractor}" method="post" class="space-y-5">
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" name="username" required class="saas-input" placeholder="Enter username">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Password</label>
                            <input type="password" name="password" required minlength="6" class="saas-input" placeholder="Enter password (min 6 characters)">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Full Name</label>
                            <input type="text" name="fullName" required class="saas-input" placeholder="Enter full name">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email (Optional)</label>
                            <input type="email" name="email" class="saas-input" placeholder="contractor@example.com">
                        </div>

                        <div class="flex items-center justify-between pt-4 border-t border-neutral-100">
                            <a href="/super-admin/users" class="px-4 py-2 text-xs font-medium text-neutral-600 hover:text-neutral-900 transition-colors">
                                Cancel
                            </a>
                            <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white text-xs font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                                Create Contractor
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
