<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('User Management')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('users')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-neutral-200 px-4 sm:px-8 flex items-center gap-4 shrink-0 sticky top-0 z-20 shadow-sm">
            <button @click="sidebarOpen=true" class="p-1.5 -ml-2 rounded-md text-neutral-500 hover:bg-neutral-100 lg:hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="flex items-center gap-2 text-sm text-neutral-500 flex-1">
                <a href="/super-admin/dashboard" class="hover:text-purple-600 transition-colors">Dashboard</a>
                <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <h1 class="text-sm font-bold font-heading text-neutral-900">User Management</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-3">
                <a href="/super-admin/create-admin" class="px-3 py-2 bg-purple-600 text-white text-xs font-semibold rounded-lg hover:bg-purple-700 transition-colors">
                    <span class="hidden sm:inline">Create Admin</span>
                    <span class="sm:hidden">Admin</span>
                </a>
                <a href="/super-admin/create-contractor" class="px-3 py-2 bg-indigo-600 text-white text-xs font-semibold rounded-lg hover:bg-indigo-700 transition-colors">
                    <span class="hidden sm:inline">Create Contractor</span>
                    <span class="sm:hidden">Contractor</span>
                </a>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-7xl mx-auto space-y-6 pb-12">

                <!-- Flash Messages -->
                <div th:replace="~{fragments/super-admin-layout :: flash-messages}"></div>

                <!-- Filters -->
                <div class="saas-card p-4">
                    <form method="get" class="flex flex-wrap gap-3 items-center">
                        <select name="userType" class="saas-input !w-auto !py-2.5 !px-4 text-sm">
                            <option value="">All Types</option>
                            <option value="ADMIN" th:selected="${userType == 'ADMIN'}">Admins</option>
                            <option value="CONTRACTOR" th:selected="${userType == 'CONTRACTOR'}">Contractors</option>
                            <option value="SUPER_ADMIN" th:selected="${userType == 'SUPER_ADMIN'}">Super Admins</option>
                        </select>
                        <button type="submit" class="px-4 py-2.5 bg-neutral-900 text-white text-xs font-semibold rounded-lg hover:bg-neutral-800 transition-colors">
                            Filter
                        </button>
                        <a href="/super-admin/users" class="px-4 py-2.5 text-neutral-600 text-xs font-medium hover:text-neutral-900 transition-colors">
                            Clear
                        </a>
                    </form>
                </div>

                <!-- Users Table -->
                <div class="saas-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-neutral-200">
                            <thead class="bg-neutral-50">
                                <tr>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">User</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden sm:table-cell">Type</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden md:table-cell">Created</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Status</th>
                                    <th class="px-4 sm:px-6 py-3 text-right text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-neutral-200">
                                <tr th:each="user : ${users}" class="hover:bg-neutral-50">
                                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap">
                                        <div class="flex items-center gap-3">
                                            <div class="w-9 h-9 rounded-full bg-purple-100 flex items-center justify-center text-purple-700 font-bold text-sm shrink-0 overflow-hidden">
                                                <img th:if="${user.avatarPath != null}" th:src="@{'/uploads/' + ${user.avatarPath}}" class="w-full h-full object-cover" alt="">
                                                <span th:unless="${user.avatarPath != null}" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                                            </div>
                                            <div class="min-w-0">
                                                <p class="text-sm font-medium text-neutral-900 truncate" th:text="${user.username}">Username</p>
                                                <p class="text-xs text-neutral-500 truncate" th:if="${user instanceof T(root.cyb.mh.skylink_media_service.domain.entities.Contractor)}" th:text="${user.fullName}">Full Name</p>
                                                <span class="sm:hidden px-1.5 py-0.5 text-[10px] font-semibold rounded-full"
                                                      th:classappend="${user.role == 'SUPER_ADMIN'} ? 'bg-purple-100 text-purple-800' : (${user.role == 'ADMIN'} ? 'bg-indigo-100 text-indigo-800' : 'bg-neutral-100 text-neutral-700')"
                                                      th:text="${user.role}">Type</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap hidden sm:table-cell">
                                        <span class="px-2 py-1 text-xs font-semibold rounded-full"
                                              th:classappend="${user.role == 'SUPER_ADMIN'} ? 'bg-purple-100 text-purple-800' : (${user.role == 'ADMIN'} ? 'bg-indigo-100 text-indigo-800' : 'bg-neutral-100 text-neutral-700')"
                                              th:text="${user.role}">Type</span>
                                    </td>
                                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-neutral-500 hidden md:table-cell"
                                        th:text="${#temporals.format(user.createdAt, 'MM-dd-yyyy')}">Date</td>
                                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap">
                                        <span th:if="${user.isBlocked != null and user.isBlocked}" class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800">Blocked</span>
                                        <span th:unless="${user.isBlocked != null and user.isBlocked}" class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">Active</span>
                                    </td>
                                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-right">
                                        <div class="flex items-center justify-end gap-2">
                                            <!-- Edit -->
                                            <a th:href="@{/super-admin/users/{id}/edit(id=${user.id})}" class="text-indigo-600 hover:text-indigo-900 text-xs font-medium">Edit</a>
                                            <!-- Block/Unblock -->
                                            <form th:if="${(user.isBlocked == null or !user.isBlocked) and user.role != 'SUPER_ADMIN'}" th:action="@{/super-admin/users/{id}/block(id=${user.id})}" method="post" class="inline" onsubmit="return confirm('Block this user?');">
                                                <button type="submit" class="text-amber-600 hover:text-amber-900 text-xs font-medium">Block</button>
                                            </form>
                                            <form th:if="${user.isBlocked != null and user.isBlocked}" th:action="@{/super-admin/users/{id}/unblock(id=${user.id})}" method="post" class="inline">
                                                <button type="submit" class="text-green-600 hover:text-green-900 text-xs font-medium">Unblock</button>
                                            </form>
                                            <!-- Delete -->
                                            <form th:if="${user.role != 'SUPER_ADMIN'}" th:action="@{/super-admin/users/{id}/delete(id=${user.id})}" method="post" class="inline" onsubmit="return confirm('Are you sure? This cannot be undone.');">
                                                <button type="submit" class="text-red-600 hover:text-red-900 text-xs font-medium">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${users.empty}" class="p-8 text-center text-neutral-400">
                        No users found
                    </div>
                </div>

                <!-- Pagination -->
                <div th:if="${users.totalPages > 1}" class="flex justify-center gap-2">
                    <a th:if="${users.hasPrevious()}" th:href="@{/super-admin/users(page=${users.number - 1}, userType=${userType})}" 
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Previous</a>
                    <span th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}">
                        <a th:href="@{/super-admin/users(page=${i}, userType=${userType})}" 
                           th:classappend="${i == users.number} ? 'bg-purple-600 text-white border-purple-600' : 'bg-white text-neutral-600 hover:bg-neutral-50'"
                           class="px-4 py-2 border border-neutral-200 rounded-lg text-sm transition-colors inline-block"
                           th:text="${i + 1}">1</a>
                    </span>
                    <a th:if="${users.hasNext()}" th:href="@{/super-admin/users(page=${users.number + 1}, userType=${userType})}"
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Next</a>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
