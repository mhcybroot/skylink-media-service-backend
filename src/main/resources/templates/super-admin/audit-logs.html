<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('Audit Logs')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('audit-logs')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header th:replace="~{fragments/super-admin-layout :: header('Audit Logs', '/super-admin/audit-logs')}"></header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-7xl mx-auto space-y-6 pb-12">

                <!-- Filters -->
                <div class="saas-card p-4">
                    <form method="get" class="flex flex-wrap gap-3 items-center">
                        <select name="actionType" class="saas-input !w-auto !py-2.5 !px-4 text-sm">
                            <option value="">All Actions</option>
                            <option th:each="type : ${actionTypes}" th:value="${type.name()}" th:selected="${actionType == type.name()}" th:text="${type.displayName}">Type</option>
                        </select>
                        <select name="targetType" class="saas-input !w-auto !py-2.5 !px-4 text-sm">
                            <option value="">All Targets</option>
                            <option value="Admin" th:selected="${targetType == 'Admin'}">Admin</option>
                            <option value="Contractor" th:selected="${targetType == 'Contractor'}">Contractor</option>
                            <option value="SuperAdmin" th:selected="${targetType == 'SuperAdmin'}">SuperAdmin</option>
                        </select>
                        <button type="submit" class="px-4 py-2.5 bg-neutral-900 text-white text-xs font-semibold rounded-lg hover:bg-neutral-800 transition-colors">Filter</button>
                        <a href="/super-admin/audit-logs" class="px-4 py-2.5 text-neutral-600 text-xs font-medium hover:text-neutral-900 transition-colors">Clear</a>
                    </form>
                </div>

                <!-- Audit Logs Table -->
                <div class="saas-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-neutral-200">
                            <thead class="bg-neutral-50">
                                <tr>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Timestamp</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Action</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden sm:table-cell">Actor</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden md:table-cell">Target</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden lg:table-cell">Details</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden xl:table-cell">IP</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-neutral-200">
                                <tr th:each="log : ${logs}" class="hover:bg-neutral-50">
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 whitespace-nowrap" th:text="${#temporals.format(log.timestamp, 'MM-dd HH:mm:ss')}">Time</td>
                                    <td class="px-4 sm:px-6 py-4">
                                        <span class="px-2 py-1 text-xs font-semibold rounded-full"
                                              th:classappend="${log.actionType.name().contains('DELETE')} ? 'bg-red-100 text-red-800' : (${log.actionType.name().contains('BLOCK')} ? 'bg-amber-100 text-amber-800' : (${log.actionType.name().contains('LOGIN')} ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'))"
                                              th:text="${log.actionType.displayName}">Action</span>
                                    </td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-900 hidden sm:table-cell" th:text="${log.actorUsername ?: 'System'}">Actor</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 hidden md:table-cell" th:text="${log.targetType + ' #' + log.targetId}">Target</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 max-w-xs truncate hidden lg:table-cell" th:text="${log.details}">Details</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-400 hidden xl:table-cell" th:text="${log.ipAddress}">IP</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${logs.empty}" class="p-8 text-center text-neutral-400">No audit logs found</div>
                </div>

                <!-- Pagination -->
                <div th:if="${logs.totalPages > 1}" class="flex justify-center gap-2">
                    <a th:if="${logs.hasPrevious()}" th:href="@{/super-admin/audit-logs(page=${logs.number - 1}, actionType=${actionType}, targetType=${targetType})}" 
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Previous</a>
                    <a th:if="${logs.hasNext()}" th:href="@{/super-admin/audit-logs(page=${logs.number + 1}, actionType=${actionType}, targetType=${targetType})}" 
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Next</a>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
