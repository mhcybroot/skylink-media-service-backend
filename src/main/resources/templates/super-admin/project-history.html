<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/super-admin-layout :: head(~{::title/text()})}"></th:block>
    <title th:text="'History — ' + ${project.workOrderNumber} + ' - Super Admin | Skylink'">History - Skylink</title>
</head>

<body class="text-neutral-800 font-sans antialiased overflow-hidden flex h-screen" x-data="{ sidebarOpen: false }">

    <!-- Mobile Backdrop -->
    <div x-show="sidebarOpen" x-transition.opacity class="fixed inset-0 z-40 bg-neutral-900/40 backdrop-blur-sm lg:hidden" @click="sidebarOpen = false" x-cloak></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('projects')}"></aside>

    <!-- Mobile Overlay -->
    <th:block th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></th:block>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-neutral-200 px-4 sm:px-6 flex items-center gap-4 shrink-0 shadow-sm z-20">
            <button @click="sidebarOpen = true" class="p-1.5 -ml-2 rounded-md text-neutral-500 hover:bg-neutral-100 lg:hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <a href="/super-admin/projects" class="text-neutral-400 hover:text-purple-600 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </a>
            <div class="flex-1 min-w-0">
                <h1 class="text-lg font-bold text-neutral-900 truncate font-heading" th:text="${project.workOrderNumber}">Project</h1>
                <p class="text-xs text-neutral-500 truncate">Project History</p>
            </div>
            <div class="flex items-center gap-2">
                <a th:href="@{/super-admin/projects/{id}(id=${project.id})}" class="px-3 py-1.5 text-xs font-medium text-purple-600 bg-purple-50 rounded-lg hover:bg-purple-100 transition-colors">
                    View Project
                </a>
            </div>
        </header>

        <!-- Main -->
        <main class="flex-1 overflow-y-auto premium-scroll p-4 lg:p-6 bg-neutral-50">
            <!-- Project Info -->
            <div class="saas-card p-4 mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-purple-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-neutral-900" th:text="${project.workOrderNumber}">WO-001</p>
                        <p class="text-xs text-neutral-500" th:text="${project.location}">Location</p>
                    </div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="saas-card p-6">
                <h2 class="text-lg font-semibold text-neutral-900 mb-6">Activity Timeline</h2>
                
                <div th:if="${#lists.size(auditLogs) > 0}" class="relative">
                    <!-- Timeline line -->
                    <div class="absolute left-4 top-0 bottom-0 w-0.5 bg-neutral-200"></div>
                    
                    <!-- Timeline items -->
                    <div class="space-y-6">
                        <div th:each="log : ${auditLogs}" class="relative pl-10">
                            <!-- Timeline dot -->
                            <div class="absolute left-2 top-1 w-5 h-5 rounded-full border-2 border-purple-500 bg-white flex items-center justify-center">
                                <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                            </div>
                            
                            <!-- Content -->
                            <div class="bg-neutral-50 rounded-lg p-4 border border-neutral-100">
                                <div class="flex items-start justify-between gap-4 mb-2">
                                    <div>
                                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                                              th:classappend="${
                                                  log.actionType.name() == 'PROJECT_CREATED' ? 'bg-green-100 text-green-800' :
                                                  log.actionType.name() == 'PROJECT_OPENED' ? 'bg-cyan-100 text-cyan-800' :
                                                  log.actionType.name() == 'PROJECT_COMPLETED' ? 'bg-emerald-100 text-emerald-800' :
                                                  log.actionType.name() == 'PROJECT_BLOCKED' ? 'bg-red-100 text-red-800' :
                                                  log.actionType.name() == 'PROJECT_UNBLOCKED' ? 'bg-lime-100 text-lime-800' :
                                                  log.actionType.name() == 'PROJECT_UPDATED' ? 'bg-blue-100 text-blue-800' :
                                                  log.actionType.name() == 'STATUS_CHANGED' ? 'bg-yellow-100 text-yellow-800' :
                                                  log.actionType.name() == 'CONTRACTOR_ASSIGNED' ? 'bg-purple-100 text-purple-800' :
                                                  log.actionType.name() == 'CHAT_MESSAGE_SENT' ? 'bg-indigo-100 text-indigo-800' :
                                                  (log.actionType.name() == 'PHOTO_UPLOADED' or log.actionType.name() == 'PHOTOS_VIEWED' or log.actionType.name() == 'PHOTOS_DOWNLOADED') ? 'bg-teal-100 text-teal-800' :
                                                  'bg-neutral-100 text-neutral-800'
                                              }"
                                              th:text="${log.actionType.displayName}">Action</span>
                                    </div>
                                    <span class="text-xs text-neutral-400" th:text="${#temporals.format(log.timestamp, 'MMM dd, yyyy HH:mm')}">Date</span>
                                </div>
                                
                                <div th:if="${log.actionType.name() == 'CHAT_MESSAGE_SENT'}" class="space-y-3">
                                    <p class="text-sm text-neutral-700" th:text="${log.newValue ?: log.details}">Preview</p>
                                    <details th:if="${log.details != null and log.newValue != null and log.details != log.newValue}" class="group">
                                        <summary class="text-xs font-semibold text-purple-600 hover:text-purple-700 cursor-pointer list-none">
                                            Show full message
                                        </summary>
                                        <p class="text-sm text-neutral-700 mt-3 whitespace-pre-wrap break-words" th:text="${log.details}">Full message</p>
                                    </details>
                                </div>
                                <p th:unless="${log.actionType.name() == 'CHAT_MESSAGE_SENT'}" class="text-sm text-neutral-700" th:text="${log.details}">Details</p>
                                
                                <div th:if="${log.admin != null}" class="flex items-center gap-2 mt-3 pt-3 border-t border-neutral-100">
                                    <div class="w-6 h-6 rounded-full bg-purple-100 flex items-center justify-center text-purple-700 text-xs font-bold">
                                        <span th:text="${#strings.substring(log.admin.username, 0, 1).toUpperCase()}">U</span>
                                    </div>
                                    <span class="text-xs text-neutral-500" th:text="${log.admin.username}">Username</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Empty state -->
                <div th:if="${#lists.isEmpty(auditLogs)}" class="text-center py-12">
                    <div class="w-16 h-16 rounded-full bg-neutral-100 flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <p class="text-neutral-500 font-medium">No activity recorded</p>
                    <p class="text-sm text-neutral-400 mt-1">Activity will appear here as actions are performed</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
