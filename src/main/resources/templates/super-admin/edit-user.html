<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('Edit User')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('users')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-neutral-200 px-4 sm:px-8 flex items-center gap-4 shrink-0 sticky top-0 z-20 shadow-sm">
            <button @click="sidebarOpen=true" class="p-1.5 -ml-2 rounded-md text-neutral-500 hover:bg-neutral-100 lg:hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="flex items-center gap-2 text-sm text-neutral-500">
                <a href="/super-admin/dashboard" class="hover:text-purple-600 transition-colors">Dashboard</a>
                <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <a href="/super-admin/users" class="hover:text-purple-600 transition-colors">User Management</a>
                <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <h1 class="text-sm font-bold font-heading text-neutral-900">Edit User</h1>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-2xl mx-auto space-y-6 pb-12">

                <!-- Flash Messages -->
                <div th:replace="~{fragments/super-admin-layout :: flash-messages}"></div>

                <!-- User Info Card -->
                <div class="saas-card p-6 flex items-center gap-5">
                    <div class="w-16 h-16 rounded-2xl overflow-hidden bg-purple-100 flex items-center justify-center border-2 border-purple-200 shrink-0">
                        <img th:if="${editUser.avatarPath != null}" th:src="@{'/uploads/' + ${editUser.avatarPath}}" class="w-full h-full object-cover" alt="avatar">
                        <span th:unless="${editUser.avatarPath != null}" class="text-purple-600 font-bold text-2xl font-heading" th:text="${#strings.substring(editUser.username, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold font-heading text-neutral-900" th:text="${editUser.username}">Username</h2>
                        <span class="px-2 py-1 text-xs font-semibold rounded-full"
                              th:classappend="${editUser.role == 'SUPER_ADMIN'} ? 'bg-purple-100 text-purple-800' : (${editUser.role == 'ADMIN'} ? 'bg-indigo-100 text-indigo-800' : 'bg-neutral-100 text-neutral-700')"
                              th:text="${editUser.role}">Type</span>
                    </div>
                </div>

                <!-- Profile Edit Form -->
                <div class="saas-card p-6 sm:p-8">
                    <h3 class="text-sm font-bold font-heading text-neutral-900 mb-6">Profile Information</h3>
                    
                    <!-- Admin Form -->
                    <form th:if="${editUser instanceof T(root.cyb.mh.skylink_media_service.domain.entities.Admin)}" 
                          th:action="@{/super-admin/admins/{id}/update(id=${editUser.id})}" 
                          method="post" enctype="multipart/form-data" class="space-y-5">
                        
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" th:value="${editUser.username}" disabled class="saas-input bg-neutral-100 cursor-not-allowed">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" name="email" th:value="${editUser.email}" class="saas-input" placeholder="admin@example.com">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Avatar</label>
                            <input type="file" name="avatar" accept="image/*" class="w-full text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                            <p class="mt-1.5 text-xs text-neutral-400">Max 2MB, images only</p>
                        </div>

                        <div class="flex items-center justify-between pt-4 border-t border-neutral-100">
                            <a href="/super-admin/users" class="px-4 py-2 text-xs font-medium text-neutral-600 hover:text-neutral-900 transition-colors">
                                Cancel
                            </a>
                            <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white text-xs font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                                Update Admin
                            </button>
                        </div>
                    </form>

                    <!-- Contractor Form -->
                    <form th:if="${editUser instanceof T(root.cyb.mh.skylink_media_service.domain.entities.Contractor)}" 
                          th:action="@{/super-admin/contractors/{id}/update(id=${editUser.id})}" 
                          method="post" enctype="multipart/form-data" class="space-y-5">
                        
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" th:value="${editUser.username}" disabled class="saas-input bg-neutral-100 cursor-not-allowed">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Full Name</label>
                            <input type="text" name="fullName" th:value="${editUser.fullName}" class="saas-input" placeholder="Enter full name">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" name="email" th:value="${editUser.email}" class="saas-input" placeholder="contractor@example.com">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Avatar</label>
                            <input type="file" name="avatar" accept="image/*" class="w-full text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                            <p class="mt-1.5 text-xs text-neutral-400">Max 2MB, images only</p>
                        </div>

                        <div class="flex items-center justify-between pt-4 border-t border-neutral-100">
                            <a href="/super-admin/users" class="px-4 py-2 text-xs font-medium text-neutral-600 hover:text-neutral-900 transition-colors">
                                Cancel
                            </a>
                            <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white text-xs font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                                Update Contractor
                            </button>
                        </div>
                    </form>

                    <!-- Super Admin Form (self-edit only) -->
                    <form th:if="${editUser instanceof T(root.cyb.mh.skylink_media_service.domain.entities.SuperAdmin)}" 
                          th:action="@{/super-admin/profile/update}" 
                          method="post" enctype="multipart/form-data" class="space-y-5">
                        
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" th:value="${editUser.username}" disabled class="saas-input bg-neutral-100 cursor-not-allowed">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" name="email" th:value="${editUser.email}" class="saas-input" placeholder="superadmin@example.com">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Avatar</label>
                            <input type="file" name="avatar" accept="image/*" class="w-full text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 cursor-pointer">
                            <p class="mt-1.5 text-xs text-neutral-400">Max 2MB, images only</p>
                        </div>

                        <div class="flex items-center justify-between pt-4 border-t border-neutral-100">
                            <a href="/super-admin/users" class="px-4 py-2 text-xs font-medium text-neutral-600 hover:text-neutral-900 transition-colors">
                                Cancel
                            </a>
                            <button type="submit" class="px-5 py-2.5 bg-purple-600 text-white text-xs font-semibold rounded-lg hover:bg-purple-700 transition-colors shadow-sm">
                                Update Profile
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Password Reset Section (not for self - self uses profile page) -->
                <div th:if="${editUser.id != currentUser.id}" class="saas-card p-6 sm:p-8">
                    <h3 class="text-sm font-bold font-heading text-neutral-900 mb-1">Reset Password</h3>
                    <p class="text-sm text-neutral-500 mb-6">Set a new password for this user.</p>
                    
                    <form th:action="@{/super-admin/users/{id}/reset-password(id=${editUser.id})}" method="post" class="space-y-5">
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">New Password</label>
                            <input type="password" name="newPassword" required minlength="6" class="saas-input" placeholder="Enter new password">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Confirm Password</label>
                            <input type="password" name="confirmPassword" required minlength="6" class="saas-input" placeholder="Confirm new password">
                        </div>

                        <div class="pt-4 border-t border-neutral-100">
                            <button type="submit" class="px-5 py-2.5 bg-amber-600 text-white text-xs font-semibold rounded-lg hover:bg-amber-700 transition-colors shadow-sm">
                                Reset Password
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Self Password Change Link -->
                <div th:if="${editUser.id == currentUser.id}" class="saas-card p-6">
                    <p class="text-sm text-neutral-600">
                        To change your password, visit your 
                        <a href="/super-admin/profile" class="text-purple-600 hover:text-purple-800 font-medium">profile page</a>.
                    </p>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
