<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('My Profile')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('profile')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header th:replace="~{fragments/super-admin-layout :: header('My Profile', '/super-admin/profile')}"></header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-2xl mx-auto space-y-6 pb-12">

                <!-- Flash Messages -->
                <div th:replace="~{fragments/super-admin-layout :: flash-messages}"></div>

                <!-- Avatar + Info header -->
                <div class="saas-card p-6 flex items-center gap-6">
                    <div class="relative shrink-0">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden bg-purple-100 flex items-center justify-center border-2 border-purple-200">
                            <img th:if="${user.avatarPath != null}" th:src="@{'/uploads/' + ${user.avatarPath}}" class="w-full h-full object-cover" alt="avatar">
                            <span th:unless="${user.avatarPath != null}" class="text-purple-600 font-bold text-3xl font-heading" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">S</span>
                        </div>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold font-heading text-neutral-900" th:text="${user.username}"></h2>
                        <p class="text-sm text-neutral-500 mt-0.5">Super Administrator</p>
                        <span class="inline-flex items-center gap-1 mt-2 px-2 py-1 text-xs font-bold rounded-full bg-purple-100 text-purple-800">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                            SUPER ADMIN
                        </span>
                    </div>
                </div>

                <!-- Profile Information Form -->
                <div class="saas-card p-6 sm:p-8">
                    <h3 class="text-sm font-bold font-heading text-neutral-900 mb-6">Profile Information</h3>
                    
                    <form th:action="@{/super-admin/profile/update}" method="post" enctype="multipart/form-data" class="space-y-5">
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" th:value="${user.username}" disabled class="saas-input bg-neutral-100 cursor-not-allowed">
                            <p class="mt-1.5 text-xs text-neutral-400">Username cannot be changed</p>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" name="email" th:value="${user.email}" class="saas-input" placeholder="superadmin@example.com">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Avatar</label>
                            <input type="file" name="avatar" accept="image/*" class="w-full text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 cursor-pointer">
                            <p class="mt-1.5 text-xs text-neutral-400">Max 2MB, images only</p>
                        </div>

                        <div class="pt-4 border-t border-neutral-100">
                            <button type="submit" class="px-5 py-2.5 bg-purple-600 text-white text-xs font-semibold rounded-lg hover:bg-purple-700 transition-colors shadow-sm">
                                Update Profile
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Password Change Form -->
                <div class="saas-card p-6 sm:p-8">
                    <h3 class="text-sm font-bold font-heading text-neutral-900 mb-1">Change Password</h3>
                    <p class="text-sm text-neutral-500 mb-6">Update your account password.</p>

                    <!-- Password Messages -->
                    <div th:if="${passwordSuccess}" class="mb-5 p-3.5 rounded-lg bg-green-50 text-green-800 border-l-4 border-green-500 text-sm font-medium" th:text="${passwordSuccess}"></div>
                    <div th:if="${passwordError}" class="mb-5 p-3.5 rounded-lg bg-red-50 text-red-800 border-l-4 border-red-500 text-sm font-medium" th:text="${passwordError}"></div>

                    <form th:action="@{/super-admin/profile/change-password}" method="post" class="space-y-5">
                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Current Password</label>
                            <input type="password" name="currentPassword" required class="saas-input" placeholder="Enter current password">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">New Password</label>
                            <input type="password" name="newPassword" required minlength="6" class="saas-input" placeholder="Enter new password (min 6 characters)">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Confirm New Password</label>
                            <input type="password" name="confirmPassword" required minlength="6" class="saas-input" placeholder="Confirm new password">
                        </div>

                        <div class="pt-4 border-t border-neutral-100">
                            <button type="submit" class="px-5 py-2.5 bg-amber-600 text-white text-xs font-semibold rounded-lg hover:bg-amber-700 transition-colors shadow-sm">
                                Change Password
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
