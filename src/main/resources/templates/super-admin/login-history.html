<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/super-admin-layout :: head('Login History')}"></head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <!-- Mobile Overlay -->
    <div th:replace="~{fragments/super-admin-layout :: mobile-overlay}"></div>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/super-admin-layout :: sidebar('login-history')}"></aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        
        <!-- Header -->
        <header th:replace="~{fragments/super-admin-layout :: header('Login History', '/super-admin/login-history')}"></header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-7xl mx-auto space-y-6 pb-12">

                <!-- Filters -->
                <div class="saas-card p-4">
                    <form method="get" class="flex flex-wrap gap-3 items-center">
                        <select name="userType" class="saas-input !w-auto !py-2.5 !px-4 text-sm">
                            <option value="">All Types</option>
                            <option value="ADMIN" th:selected="${userType == 'ADMIN'}">Admin</option>
                            <option value="CONTRACTOR" th:selected="${userType == 'CONTRACTOR'}">Contractor</option>
                            <option value="SUPER_ADMIN" th:selected="${userType == 'SUPER_ADMIN'}">Super Admin</option>
                        </select>
                        <select name="successful" class="saas-input !w-auto !py-2.5 !px-4 text-sm">
                            <option value="">All Status</option>
                            <option value="true" th:selected="${successful == true}">Success</option>
                            <option value="false" th:selected="${successful == false}">Failed</option>
                        </select>
                        <button type="submit" class="px-4 py-2.5 bg-neutral-900 text-white text-xs font-semibold rounded-lg hover:bg-neutral-800 transition-colors">Filter</button>
                        <a href="/super-admin/login-history" class="px-4 py-2.5 text-neutral-600 text-xs font-medium hover:text-neutral-900 transition-colors">Clear</a>
                    </form>
                </div>

                <!-- Login History Table -->
                <div class="saas-card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-neutral-200">
                            <thead class="bg-neutral-50">
                                <tr>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Time</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Username</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden sm:table-cell">Type</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Status</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden md:table-cell">IP Address</th>
                                    <th class="px-4 sm:px-6 py-3 text-left text-[11px] font-bold text-neutral-500 uppercase tracking-wider hidden lg:table-cell">User Agent</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-neutral-200">
                                <tr th:each="log : ${logs}" class="hover:bg-neutral-50">
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 whitespace-nowrap" th:text="${#temporals.format(log.loginTime, 'MM-dd HH:mm:ss')}">Time</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm font-medium text-neutral-900" th:text="${log.username}">Username</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 hidden sm:table-cell" th:text="${log.userType}">Type</td>
                                    <td class="px-4 sm:px-6 py-4">
                                        <span th:if="${log.successful}" class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">Success</span>
                                        <span th:unless="${log.successful}" class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800">Failed</span>
                                    </td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-500 hidden md:table-cell" th:text="${log.ipAddress}">IP</td>
                                    <td class="px-4 sm:px-6 py-4 text-sm text-neutral-400 max-w-xs truncate hidden lg:table-cell" th:text="${log.userAgent}">Agent</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${logs.empty}" class="p-8 text-center text-neutral-400">No login history found</div>
                </div>

                <!-- Pagination -->
                <div th:if="${logs.totalPages > 1}" class="flex justify-center gap-2">
                    <a th:if="${logs.hasPrevious()}" th:href="@{/super-admin/login-history(page=${logs.number - 1}, userType=${userType}, successful=${successful})}" 
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Previous</a>
                    <a th:if="${logs.hasNext()}" th:href="@{/super-admin/login-history(page=${logs.number + 1}, userType=${userType}, successful=${successful})}" 
                       class="px-4 py-2 border border-neutral-200 rounded-lg text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">Next</a>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
