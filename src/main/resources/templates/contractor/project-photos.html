<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Photos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/contractor/dashboard" class="text-blue-600 hover:text-blue-800 mr-4 text-sm sm:text-base">← Back</a>
                    <h1 class="text-lg sm:text-xl font-semibold">
                        Photos for <span th:text="${project.workOrderNumber}"></span>
                    </h1>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-4 sm:py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white shadow rounded-lg p-4 sm:p-6 mb-6">
            <h2 class="text-base sm:text-lg font-semibold mb-4">Project Details</h2>
            
            <div class="space-y-3">
                <div>
                    <span class="text-sm font-medium text-gray-700">Work Order: </span>
                    <span th:text="${project.workOrderNumber}"></span>
                </div>
                <div>
                    <span class="text-sm font-medium text-gray-700">Location: </span>
                    <span th:text="${project.location}"></span>
                </div>
                <div>
                    <span class="text-sm font-medium text-gray-700">Client Code: </span>
                    <span th:text="${project.clientCode}"></span>
                </div>
                <div th:if="${project.description}">
                    <span class="text-sm font-medium text-gray-700">Description: </span>
                    <span th:text="${project.description}"></span>
                </div>
                <div th:if="${project.workType}">
                    <span class="text-sm font-medium text-gray-700">Work Type: </span>
                    <span th:text="${project.workType}"></span>
                </div>
                <div th:if="${project.workDetails}">
                    <span class="text-sm font-medium text-gray-700">Work Details: </span>
                    <span th:text="${project.workDetails}"></span>
                </div>
                <div th:if="${project.address}">
                    <span class="text-sm font-medium text-gray-700">Address: </span>
                    <span th:text="${project.address}"></span>
                </div>
                <div th:if="${project.dueDate}">
                    <span class="text-sm font-medium text-gray-700">Due Date: </span>
                    <span th:text="${project.dueDate}"></span>
                </div>
                <div th:if="${project.loanNumber}">
                    <span class="text-sm font-medium text-gray-700">Loan Number: </span>
                    <span th:text="${project.loanNumber}"></span>
                </div>
                <div th:if="${project.loanType}">
                    <span class="text-sm font-medium text-gray-700">Loan Type: </span>
                    <span th:text="${project.loanType}"></span>
                </div>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4">
                <h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-0">My Uploaded Photos</h2>
                <a th:href="@{'/contractor/upload-photo/' + ${project.id}}" 
                   class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-center text-sm">
                    Upload More Photos
                </a>
            </div>
            
            <div th:if="${#lists.isEmpty(photos)}" class="text-gray-500 text-center py-8 text-sm sm:text-base">
                No photos uploaded yet.
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 lg:gap-10">
                <div th:each="photo : ${photos}" class="border rounded-lg p-4 sm:p-5 shadow-sm">
                    <div class="aspect-w-16 aspect-h-9 mb-4">
                        <img th:src="@{'/uploads/' + ${photo.fileName}}" 
                             th:alt="${photo.originalName}"
                             class="w-full h-32 sm:h-48 object-cover rounded">
                    </div>
                    <p class="text-xs sm:text-sm font-medium mb-2" th:text="${photo.originalName}"></p>
                    <p class="text-xs text-gray-500 mb-1" th:text="${#temporals.format(photo.uploadedAt, 'yyyy-MM-dd HH:mm')}"></p>
                    <p class="text-xs text-gray-400" th:text="${#numbers.formatDecimal(photo.fileSize / 1024, 0, 0)} + ' KB'"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
