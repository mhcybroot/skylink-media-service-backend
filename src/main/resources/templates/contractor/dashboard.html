<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Project Manager">
    
    <title>Contractor Dashboard - Project Manager</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Touch-friendly controls */
        button, input, a.btn {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        #install-btn {
            display: none;
        }
        
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Install PWA Button -->
    <div id="install-btn" class="fixed top-4 right-4 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg cursor-pointer hover:bg-blue-700">
        Install App
    </div>
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-lg sm:text-xl font-semibold">Contractor Dashboard</h1>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span sec:authentication="name" class="text-gray-700 text-sm sm:text-base"></span>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-red-600 hover:text-red-800 text-sm sm:text-base">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-4 sm:py-6 px-4 sm:px-6 lg:px-8">
        <div th:if="${success}" class="mb-4 p-3 sm:p-4 bg-green-100 border border-green-400 text-green-700 rounded text-sm sm:text-base">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="mb-4 p-3 sm:p-4 bg-red-100 border border-red-400 text-red-700 rounded text-sm sm:text-base">
            <span th:text="${error}"></span>
        </div>

        <div class="bg-white shadow rounded-lg p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4">
                <h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-0">My Assigned Projects</h2>
            </div>
            
            <!-- Project Search Bar -->
            <form method="get" class="mb-4">
                <div class="flex gap-2">
                    <input type="text" name="projectSearch" th:value="${projectSearch}"
                           placeholder="Search projects by work order, location, client code..."
                           class="flex-1 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 text-sm">
                        Search
                    </button>
                    <a href="/contractor/dashboard" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm">
                        Clear
                    </a>
                </div>
            </form>
            
            <div th:if="${#lists.isEmpty(assignments)}" class="text-gray-500 text-center py-8 text-sm sm:text-base">
                No projects assigned yet.
            </div>
            
            <div class="space-y-4">
                <div th:each="assignment : ${assignments}" class="border rounded-lg p-4">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
                        <div class="flex-1">
                            <h3 class="font-medium text-sm sm:text-base" th:text="${assignment.project.workOrderNumber}"></h3>
                            <p class="text-xs sm:text-sm text-gray-600" th:text="${assignment.project.location}"></p>
                            <p class="text-xs sm:text-sm text-gray-600" th:text="${assignment.project.clientCode}"></p>
                            <p th:if="${assignment.project.description}" class="text-xs sm:text-sm text-gray-500 mt-1" th:text="${assignment.project.description}"></p>
                            <p class="text-xs text-gray-500 mt-1" th:text="'Assigned: ' + ${#temporals.format(assignment.assignedAt, 'yyyy-MM-dd')}"></p>
                            
                            <!-- Photo count indicator -->
                            <div class="mt-2">
                                <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                    <span th:text="${photoCounts[assignment.project.id]} ?: 0 "></span>  photos uploaded
                                </span>
                            </div>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
                            <a th:href="@{'/contractor/upload-photo/' + ${assignment.project.id}}" 
                               class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-center text-sm">
                                Upload Photos
                            </a>
                            <a th:href="@{'/contractor/project/' + ${assignment.project.id} + '/photos'}" 
                               class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded text-center text-sm">
                                View Photos
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/pwa-register.js"></script>
</body>
</html>
