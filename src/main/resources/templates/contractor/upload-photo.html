<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Project Manager">
    
    <title>Upload Photos - Project Manager</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Touch-friendly file input and buttons */
        input[type="file"], button, a {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        input[type="file"] {
            padding: 12px;
        }
        
        #install-btn {
            display: none;
        }
        
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Install PWA Button -->
    <div id="install-btn" class="fixed top-4 right-4 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg cursor-pointer hover:bg-blue-700">
        Install App
    </div>
    <div class="max-w-md mx-auto pt-8 px-4 sm:px-6">
        <div class="bg-white shadow rounded-lg p-4 sm:p-6">
            <h2 class="text-xl sm:text-2xl font-bold mb-6">Upload Photos</h2>
            
            <form th:action="@{'/contractor/upload-photo/' + ${projectId}}" method="post" enctype="multipart/form-data" class="space-y-4">
                <div>
                    <label for="files" class="block text-sm font-medium text-gray-700">Select Photos</label>
                    <input type="file" id="files" name="files" multiple accept="image/*" required 
                           class="mt-1 block w-full px-3 py-2 sm:py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                    <p class="text-xs text-gray-500 mt-1">You can select multiple photos at once</p>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 pt-4">
                    <button type="submit" 
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-base sm:text-sm">
                        Upload Photos
                    </button>
                    <a href="/contractor/dashboard" 
                       class="flex-1 bg-gray-500 hover:bg-gray-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-center text-base sm:text-sm">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/pwa-register.js"></script>
</body>
</html>
