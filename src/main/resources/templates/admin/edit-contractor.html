<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#ffffff">
    <title>Edit Contractor - Skylink Hub</title>

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

    <!-- Fonts: Inter (Data) and Outfit (Headers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif']
                    },
                    colors: {
                        neutral: { 850: '#1f2937' },
                    },
                    boxShadow: {
                        'premium': '0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 0 3px rgba(0,0,0,0.02)',
                        'float': '0 10px 40px -10px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        /* SaaS Card Structure */
        .saas-card {
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 20px;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04), 0 0 3px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        /* Thin highlight on top of the card */
        .saas-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #818CF8, #6366F1, #4F46E5);
            z-index: 10;
        }

        /* SaaS Input Style */
        .saas-input {
            width: 100%;
            background-color: #FAFAFA;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #111827;
            font-size: 0.875rem;
            line-height: 1.25rem;
            transition: all 0.2s ease;
            height: 48px;
        }

        .saas-input:focus {
            background-color: #FFFFFF;
            border-color: #818CF8;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .saas-input::placeholder {
            color: #9CA3AF;
        }

        /* Avatar Upload Preview */
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #E5E7EB;
        }

        .avatar-upload-hover:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans"
      x-data="{ 
          showPasswordSection: false,
          avatarPreview: null,
          updateAvatarPreview(event) {
              const file = event.target.files[0];
              if (file) {
                  const reader = new FileReader();
                  reader.onload = (e) => this.avatarPreview = e.target.result;
                  reader.readAsDataURL(file);
              }
          }
      }">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-4">
                    <a href="/admin/dashboard" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span class="text-sm font-medium">Back to Dashboard</span>
                    </a>
                </div>
                <div class="flex items-center">
                    <h1 class="text-xl font-bold font-heading text-gray-900">Edit Contractor</h1>
                </div>
                <div class="flex items-center w-24"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="mb-6 p-4 rounded-xl bg-emerald-50 text-emerald-800 border border-emerald-100 flex items-center gap-3">
            <svg class="w-5 h-5 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-sm font-medium" th:text="${success}">Success message</span>
        </div>

        <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-50 text-red-800 border border-red-100 flex items-center gap-3">
            <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-sm font-medium" th:text="${error}">Error message</span>
        </div>

        <!-- Contractor Profile Card -->
        <div class="saas-card p-8 mb-6">
            <div class="flex items-center gap-6 mb-8">
                <!-- Avatar Section -->
                <div class="relative avatar-upload-hover shrink-0">
                    <img th:if="${contractor.avatarPath != null}" 
                         th:src="@{/uploads/{path}(path=${contractor.avatarPath})}"
                         class="avatar-preview"
                         alt="Contractor Avatar">
                    <div th:if="${contractor.avatarPath == null}"
                         class="avatar-preview bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-3xl font-bold"
                         th:text="${contractor.fullName != null ? contractor.fullName.substring(0,1).toUpperCase() : contractor.username.substring(0,1).toUpperCase()}">
                    </div>
                </div>
                
                <!-- Contractor Info Header -->
                <div>
                    <h2 class="text-2xl font-bold font-heading text-gray-900" 
                        th:text="${contractor.fullName != null ? contractor.fullName : contractor.username}">Contractor Name</h2>
                    <p class="text-gray-500 text-sm mt-1" th:text="'@' + ${contractor.username}">@username</p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs font-semibold rounded-full">Contractor</span>
                        <span class="text-xs text-gray-400">ID: <span th:text="${contractor.id}">123</span></span>
                    </div>
                </div>
            </div>

            <!-- Profile Update Form -->
            <form th:action="@{/admin/contractors/{id}/update(id=${contractor.id})}" 
                  method="post" 
                  enctype="multipart/form-data"
                  class="space-y-6">
                
                <!-- Avatar Upload -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Profile Photo</label>
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <img x-show="avatarPreview" 
                                 :src="avatarPreview" 
                                 class="avatar-preview"
                                 style="display: none;">
                        </div>
                        <div class="flex-1">
                            <input type="file" 
                                   name="avatar" 
                                   id="avatar"
                                   accept="image/*"
                                   @change="updateAvatarPreview($event)"
                                   class="block w-full text-sm text-gray-500
                                          file:mr-4 file:py-2 file:px-4
                                          file:rounded-lg file:border-0
                                          file:text-sm file:font-semibold
                                          file:bg-indigo-50 file:text-indigo-700
                                          hover:file:bg-indigo-100
                                          file:cursor-pointer file:transition-colors">
                            <p class="text-xs text-gray-400 mt-2">JPG, PNG or GIF. Max 2MB.</p>
                        </div>
                    </div>
                </div>

                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" 
                           id="fullName" 
                           name="fullName"
                           th:value="${contractor.fullName}"
                           class="saas-input"
                           placeholder="Enter full name">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" 
                           id="email" 
                           name="email"
                           th:value="${contractor.email}"
                           class="saas-input"
                           placeholder=" contractor@example.com">
                    <p class="text-xs text-gray-400 mt-2">Used for notifications and password recovery.</p>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                    <a href="/admin/dashboard" 
                       class="px-6 py-2.5 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">
                        Cancel
                    </a>
                    <button type="submit" 
                            class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition-colors shadow-sm">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>

        <!-- Password Reset Section -->
        <div class="saas-card overflow-hidden">
            <button @click="showPasswordSection = !showPasswordSection"
                    class="w-full px-8 py-5 flex items-center justify-between text-left hover:bg-gray-50 transition-colors">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center">
                        <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-base font-semibold text-gray-900">Reset Password</h3>
                        <p class="text-sm text-gray-500">Set a new password for this contractor account</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-400 transition-transform"
                     :class="{ 'rotate-180': showPasswordSection }"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>

            <div x-show="showPasswordSection" 
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 transform -translate-y-2"
                 x-transition:enter-end="opacity-100 transform translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 transform translate-y-0"
                 x-transition:leave-end="opacity-0 transform -translate-y-2"
                 class="border-t border-gray-100"
                 style="display: none;">
                
                <div class="p-8">
                    <!-- Password Success/Error Messages -->
                    <div th:if="${passwordSuccess}" class="mb-4 p-4 rounded-xl bg-emerald-50 text-emerald-800 border border-emerald-100 flex items-center gap-3">
                        <svg class="w-5 h-5 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-sm font-medium" th:text="${passwordSuccess}">Password changed</span>
                    </div>

                    <div th:if="${passwordError}" class="mb-4 p-4 rounded-xl bg-red-50 text-red-800 border border-red-100 flex items-center gap-3">
                        <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-sm font-medium" th:text="${passwordError}">Password error</span>
                    </div>

                    <form th:action="@{/admin/contractors/{id}/change-password(id=${contractor.id})}" 
                          method="post"
                          class="space-y-4">
                        
                        <div>
                            <label for="newPassword" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">New Password</label>
                            <input type="password" 
                                   id="newPassword" 
                                   name="newPassword"
                                   required
                                   minlength="6"
                                   class="saas-input"
                                   placeholder="Enter new password">
                        </div>

                        <div>
                            <label for="confirmPassword" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Confirm Password</label>
                            <input type="password" 
                                   id="confirmPassword" 
                                   name="confirmPassword"
                                   required
                                   minlength="6"
                                   class="saas-input"
                                   placeholder="Confirm new password">
                        </div>

                        <div class="flex items-center justify-end pt-4">
                            <button type="submit" 
                                    class="px-6 py-2.5 bg-amber-600 text-white text-sm font-semibold rounded-lg hover:bg-amber-700 transition-colors shadow-sm">
                                Reset Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
        <p class="text-xs text-gray-400">All changes are logged for security purposes.</p>
    </footer>
</body>
</html>
