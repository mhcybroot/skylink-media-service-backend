<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <title>Edit Project - Project Manager</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <style>
        input, textarea, button {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
        }
        
        .section-header {
            border-left: 4px solid #0284c7;
            padding-left: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white shadow-lg rounded-lg border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-xl font-semibold text-gray-900 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                        </svg>
                        Edit Project
                    </h2>
                </div>
                
                <form th:action="@{'/admin/edit-project/' + ${project.id}}" method="post" class="p-6 space-y-8">
                    
                    <!-- Work Order Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Work Order Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="workOrderNumber" class="block text-sm font-medium text-gray-700">
                                    WO # <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="workOrderNumber" name="workOrderNumber" required 
                                       th:value="${project.workOrderNumber}"
                                       placeholder="e.g., 360163-202"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="ppwNumber" class="block text-sm font-medium text-gray-700">PPW #</label>
                                <input type="text" id="ppwNumber" name="ppwNumber" 
                                       th:value="${project.ppwNumber}"
                                       placeholder="e.g., 3345"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="workType" class="block text-sm font-medium text-gray-700">Work Type</label>
                                <select id="workType" name="workType" 
                                        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                                    <option value="">-- Select Work Type --</option>
                                    <option value="Grass Re-cut" th:selected="${project.workType == 'Grass Re-cut'}">Grass Re-cut</option>
                                    <option value="Initial Secure" th:selected="${project.workType == 'Initial Secure'}">Initial Secure</option>
                                    <option value="Final Secure" th:selected="${project.workType == 'Final Secure'}">Final Secure</option>
                                    <option value="Inspection" th:selected="${project.workType == 'Inspection'}">Inspection</option>
                                    <option value="Property Preservation" th:selected="${project.workType == 'Property Preservation'}">Property Preservation</option>
                                    <option value="Winterization" th:selected="${project.workType == 'Winterization'}">Winterization</option>
                                    <option value="Debris Removal" th:selected="${project.workType == 'Debris Removal'}">Debris Removal</option>
                                    <option value="Maintenance" th:selected="${project.workType == 'Maintenance'}">Maintenance</option>
                                    <option value="Repair" th:selected="${project.workType == 'Repair'}">Repair</option>
                                    <option value="Pool Maintenance" th:selected="${project.workType == 'Pool Maintenance'}">Pool Maintenance</option>
                                    <option value="Eviction" th:selected="${project.workType == 'Eviction'}">Eviction</option>
                                    <option value="Other" th:selected="${project.workType == 'Other'}">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <label for="workDetails" class="block text-sm font-medium text-gray-700">Work Details</label>
                            <textarea id="workDetails" name="workDetails" rows="3"
                                      th:text="${project.workDetails}"
                                      placeholder="Work Order Information details..."
                                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm"></textarea>
                        </div>
                    </div>

                    <!-- Client Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Client Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="clientCompany" class="block text-sm font-medium text-gray-700">Client Company</label>
                                <input type="text" id="clientCompany" name="clientCompany" 
                                       th:value="${project.clientCompany}"
                                       placeholder="e.g., 120"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="customer" class="block text-sm font-medium text-gray-700">Customer</label>
                                <input type="text" id="customer" name="customer" 
                                       th:value="${project.customer}"
                                       placeholder="e.g., RMS REO"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="clientCode" class="block text-sm font-medium text-gray-700">
                                    Client Code <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="clientCode" name="clientCode" required 
                                       th:value="${project.clientCode}"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Loan Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Loan Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="loanNumber" class="block text-sm font-medium text-gray-700">Loan #</label>
                                <input type="text" id="loanNumber" name="loanNumber" 
                                       th:value="${project.loanNumber}"
                                       placeholder="e.g., 7526-306-113"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="loanType" class="block text-sm font-medium text-gray-700">Loan Type</label>
                                <input type="text" id="loanType" name="loanType" 
                                       th:value="${project.loanType}"
                                       placeholder="e.g., HECM RMSREO-AZ"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Location Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Location Information</h3>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                                <textarea id="address" name="address" rows="2"
                                          th:text="${project.address}"
                                          placeholder="e.g., 12499 N. PIANO PLACE&#10;KINGMAN, AZ 86401"
                                          class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm"></textarea>
                            </div>
                            
                            <div>
                                <label for="location" class="block text-sm font-medium text-gray-700">
                                    Location <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="location" name="location" required 
                                       th:value="${project.location}"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Timeline Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Timeline Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="receivedDate" class="block text-sm font-medium text-gray-700">Received Date</label>
                                <input type="date" id="receivedDate" name="receivedDate" 
                                       th:value="${project.receivedDate}"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm date-input">
                            </div>
                            
                            <div>
                                <label for="dueDate" class="block text-sm font-medium text-gray-700">Due Date</label>
                                <input type="date" id="dueDate" name="dueDate" 
                                       th:value="${project.dueDate}"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm date-input">
                            </div>
                        </div>
                    </div>

                    <!-- Administrative Information Section -->
                    <div>
                        <h3 class="section-header text-lg font-medium text-gray-900">Administrative Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label for="assignedTo" class="block text-sm font-medium text-gray-700">Assigned To</label>
                                <input type="text" id="assignedTo" name="assignedTo" 
                                       th:value="${project.assignedTo}"
                                       placeholder="e.g., Finara Vendor"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="woAdmin" class="block text-sm font-medium text-gray-700">WO Admin</label>
                                <input type="text" id="woAdmin" name="woAdmin" 
                                       th:value="${project.woAdmin}"
                                       placeholder="e.g., Grace Hyland"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                            
                            <div>
                                <label for="invoicePrice" class="block text-sm font-medium text-gray-700">Invoice Price ($)</label>
                                <input type="number" id="invoicePrice" name="invoicePrice" 
                                       th:value="${project.invoicePrice}"
                                       step="0.01" min="0" placeholder="0.00"
                                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea id="description" name="description" rows="3"
                                      th:text="${project.description}"
                                      placeholder="Optional project description..."
                                      class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm"></textarea>
                        </div>
                    </div>
                    
                    <!-- Form Actions -->
                    <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 pt-6 border-t border-gray-200">
                        <button type="submit" 
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-base sm:text-sm transition-colors">
                            Save Changes
                        </button>
                        <a href="/admin/dashboard" 
                           class="flex-1 bg-gray-500 hover:bg-gray-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-center text-base sm:text-sm transition-colors">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr(".date-input", {
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "m-d-Y"
        });
    });
</script>
</html>
