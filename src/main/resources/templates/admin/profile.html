<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Skylink Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], heading: ['Outfit','sans-serif'] } } } }</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak]{display:none!important}
        body{background-color:#FAFAFA}
        .premium-scroll::-webkit-scrollbar{width:5px}
        .premium-scroll::-webkit-scrollbar-track{background:transparent}
        .premium-scroll::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:10px}
        .saas-card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
        .saas-input{width:100%;background:#FAFAFA;border:1px solid #E5E7EB;border-radius:10px;padding:.625rem 1rem;color:#111827;font-size:.875rem;transition:all .2s}
        .saas-input:focus{background:#fff;border-color:#818CF8;outline:none;box-shadow:0 0 0 4px rgba(99,102,241,.1)}
    </style>
</head>
<body class="font-sans antialiased flex h-screen overflow-hidden text-neutral-800" x-data="{ sidebarOpen: false }">

    <div x-show="sidebarOpen" x-transition.opacity class="fixed inset-0 z-40 bg-neutral-900/40 backdrop-blur-sm lg:hidden" @click="sidebarOpen=false" x-cloak></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-[#111827] text-neutral-400 transition-transform duration-300 lg:translate-x-0 lg:static flex flex-col border-r border-[#1F2937]">
        <div class="h-16 flex items-center px-6 border-b border-[#1F2937]">
            <div class="flex items-center gap-3 text-white font-bold text-xl tracking-tight font-heading">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                Skylink
            </div>
        </div>
        <nav class="flex-1 px-3 py-6 space-y-1 premium-scroll overflow-y-auto">
            <a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-[#1F2937]/50 hover:text-neutral-200 font-medium text-sm transition-colors">
                <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Dashboard
            </a>
            <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-[#1F2937] text-white font-medium text-sm">
                <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                My Profile
            </div>
            <a href="/admin/register-admin" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-[#1F2937]/50 hover:text-neutral-200 font-medium text-sm transition-colors mt-6">
                <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                System Config
            </a>
        </nav>
        <div class="p-4 border-t border-[#1F2937] bg-[#0B0F19]">
            <a href="/admin/profile" class="flex items-center gap-3 w-full group">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-indigo-500/20 border border-indigo-500/30 shrink-0 flex items-center justify-center">
                    <img th:if="${user.avatarPath != null}" th:src="@{'/uploads/' + ${user.avatarPath}}" class="w-full h-full object-cover" alt="avatar">
                    <span th:unless="${user.avatarPath != null}" class="text-indigo-400 font-bold text-sm" th:text="${user.username.substring(0,1).toUpperCase()}">A</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-semibold text-neutral-200 truncate" th:text="${user.username}"></p>
                    <p class="text-[10px] text-neutral-500 uppercase tracking-widest font-bold font-heading">Admin</p>
                </div>
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-neutral-200 px-4 sm:px-8 flex items-center gap-4 shrink-0 sticky top-0 z-20">
            <button @click="sidebarOpen=true" class="p-1.5 -ml-2 rounded-md text-neutral-500 hover:bg-neutral-100 lg:hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="flex items-center gap-2 text-sm text-neutral-500">
                <a href="/admin/dashboard" class="hover:text-indigo-600 transition-colors">Dashboard</a>
                <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                <h1 class="text-sm font-bold font-heading text-neutral-900">My Profile</h1>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto premium-scroll p-4 sm:p-8">
            <div class="max-w-2xl mx-auto space-y-6 pb-12">

                <!-- Flash messages -->
                <div th:if="${success}" class="p-3.5 rounded-lg bg-green-50 text-green-800 border-l-4 border-green-500 text-sm font-medium" th:text="${success}"></div>
                <div th:if="${error}" class="p-3.5 rounded-lg bg-red-50 text-red-800 border-l-4 border-red-500 text-sm font-medium" th:text="${error}"></div>

                <!-- Avatar + Info header -->
                <div class="saas-card p-6 flex items-center gap-6">
                    <div class="relative shrink-0">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden bg-indigo-100 flex items-center justify-center border-2 border-indigo-200">
                            <img th:if="${user.avatarPath != null}" th:src="@{'/uploads/' + ${user.avatarPath}}" class="w-full h-full object-cover" alt="avatar">
                            <span th:unless="${user.avatarPath != null}" class="text-indigo-600 font-bold text-3xl font-heading" th:text="${user.username.substring(0,1).toUpperCase()}">A</span>
                        </div>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold font-heading text-neutral-900" th:text="${user.username}"></h2>
                        <p class="text-sm text-neutral-500 mt-0.5">Administrator</p>
                        <p class="text-xs text-neutral-400 mt-1" th:if="${email != null and !#strings.isEmpty(email)}">
                            <span class="inline-flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                <span th:text="${email}"></span>
                            </span>
                        </p>
                        <p class="text-xs text-neutral-400 mt-1" th:unless="${email != null and !#strings.isEmpty(email)}">No notification email set</p>
                    </div>
                </div>

                <!-- Profile update form -->
                <div class="saas-card overflow-hidden">
                    <div class="p-4 border-b border-neutral-100 bg-white">
                        <h3 class="text-sm font-bold font-heading text-neutral-900 flex items-center gap-2">
                            <div class="w-6 h-6 rounded bg-indigo-50 text-indigo-600 flex items-center justify-center">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </div>
                            Profile Information
                        </h3>
                    </div>
                    <form th:action="@{/admin/profile/update}" method="post" enctype="multipart/form-data" class="p-6 space-y-5">
                        <!-- Username (read-only) -->
                        <div>
                            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Username</label>
                            <input type="text" th:value="${user.username}" disabled class="saas-input opacity-60 cursor-not-allowed">
                        </div>
                        <!-- Email -->
                        <div>
                            <label for="email" class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5 flex items-center gap-1">
                                Notification Email
                                <span class="ml-1 text-[9px] font-bold text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded uppercase tracking-widest">Chat Alerts</span>
                            </label>
                            <input type="email" id="email" name="email" th:value="${email}" placeholder="your@email.com" class="saas-input">
                            <p class="text-[10px] text-neutral-400 mt-1.5">You'll receive an email when a contractor sends a message on your assigned projects.</p>
                        </div>
                        <!-- Avatar -->
                        <div>
                            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Profile Picture</label>
                            <input type="file" name="avatar" accept="image/*"
                                class="block w-full text-sm text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors cursor-pointer">
                            <p class="text-[10px] text-neutral-400 mt-1.5">JPG, PNG or GIF. Max 2MB.</p>
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-lg text-sm hover:bg-indigo-700 transition-all shadow-sm active:scale-[0.98]">
                                Save Profile
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Change password form -->
                <div class="saas-card overflow-hidden">
                    <div class="p-4 border-b border-neutral-100 bg-white">
                        <h3 class="text-sm font-bold font-heading text-neutral-900 flex items-center gap-2">
                            <div class="w-6 h-6 rounded bg-orange-50 text-orange-600 flex items-center justify-center">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                            </div>
                            Change Password
                        </h3>
                    </div>
                    <div th:if="${passwordSuccess}" class="mx-6 mt-4 p-3 rounded-lg bg-green-50 text-green-800 border-l-4 border-green-500 text-sm font-medium" th:text="${passwordSuccess}"></div>
                    <div th:if="${passwordError}" class="mx-6 mt-4 p-3 rounded-lg bg-red-50 text-red-800 border-l-4 border-red-500 text-sm font-medium" th:text="${passwordError}"></div>
                    <form th:action="@{/admin/profile/change-password}" method="post" class="p-6 space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Current Password</label>
                            <input type="password" name="currentPassword" required placeholder="••••••••" class="saas-input font-mono tracking-widest">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">New Password</label>
                            <input type="password" name="newPassword" required placeholder="••••••••" class="saas-input font-mono tracking-widest">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-1.5">Confirm New Password</label>
                            <input type="password" name="confirmPassword" required placeholder="••••••••" class="saas-input font-mono tracking-widest">
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="px-6 py-2.5 bg-orange-600 text-white font-bold rounded-lg text-sm hover:bg-orange-700 transition-all shadow-sm active:scale-[0.98]">
                                Change Password
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
