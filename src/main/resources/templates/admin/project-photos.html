<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Photos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/admin/dashboard" class="text-blue-600 hover:text-blue-800 mr-4">← Back</a>
                    <h1 class="text-xl font-semibold" th:text="'Photos for ' + ${project.workOrderNumber}"></h1>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 px-4">
        <div class="bg-white shadow rounded-lg p-6 mb-6">
            <h2 class="text-lg font-semibold mb-2">Project Details</h2>
            <p><strong>Work Order:</strong> <span th:text="${project.workOrderNumber}"></span></p>
            <p><strong>Location:</strong> <span th:text="${project.location}"></span></p>
            <p><strong>Client Code:</strong> <span th:text="${project.clientCode}"></span></p>
        </div>

        <div class="bg-white shadow rounded-lg p-6">
            <h2 class="text-lg font-semibold mb-4">Uploaded Photos</h2>
            
            <div th:if="${#lists.isEmpty(photos)}" class="text-gray-500 text-center py-8">
                No photos uploaded yet.
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="photo : ${photos}" class="border rounded-lg p-4">
                    <div class="aspect-w-16 aspect-h-9 mb-4">
                        <img th:src="@{'/uploads/' + ${photo.fileName}}" 
                             th:alt="${photo.originalName}"
                             class="w-full h-48 object-cover rounded">
                    </div>
                    <p class="text-sm font-medium" th:text="${photo.originalName}"></p>
                    <p class="text-xs text-gray-500" th:text="${photo.contractor.username}"></p>
                    <p class="text-xs text-gray-500" th:text="${#temporals.format(photo.uploadedAt, 'yyyy-MM-dd HH:mm')}"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
