<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- History Content Fragment - loaded via AJAX for modal -->
<div th:fragment="historyContent" class="p-6">
    <!-- Project Info Banner -->
    <div class="bg-gradient-to-r from-neutral-50 to-neutral-100 rounded-xl p-4 mb-6 border border-neutral-200">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Created</p>
                <p class="text-sm font-semibold text-neutral-700" th:text="${#temporals.format(project.createdAt, 'MMM dd, yyyy HH:mm')}">Jan 01, 2024 10:00</p>
            </div>
            <div th:if="${project.createdBy}" class="text-right">
                <p class="text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Created By</p>
                <p class="text-sm font-semibold text-neutral-700" th:text="${project.createdBy.username}">admin</p>
            </div>
        </div>
    </div>
    
    <!-- Timeline -->
    <div class="relative">
        <!-- Timeline line -->
        <div class="absolute left-5 top-0 bottom-0 w-0.5 bg-gradient-to-b from-indigo-200 via-purple-200 to-neutral-200"></div>
        
        <!-- Audit Log Entries -->
        <div th:if="${#lists.isEmpty(auditLogs)}" class="text-center py-8">
            <div class="w-16 h-16 rounded-full bg-neutral-100 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <p class="text-neutral-500 font-medium">No history records yet</p>
            <p class="text-xs text-neutral-400 mt-1">Activity will appear here as changes are made</p>
        </div>
        
        <div th:each="log : ${auditLogs}" class="relative pl-12 pb-6 last:pb-0">
            <!-- Timeline dot -->
            <div class="absolute left-3 w-4 h-4 rounded-full border-2 border-white shadow-sm"
                th:classappend="${
                    log.actionType.name() == 'PROJECT_CREATED' ? 'bg-emerald-500' :
                    log.actionType.name() == 'PROJECT_UPDATED' ? 'bg-blue-500' :
                    log.actionType.name() == 'CONTRACTOR_ASSIGNED' ? 'bg-indigo-500' :
                    log.actionType.name() == 'CONTRACTOR_UNASSIGNED' ? 'bg-amber-500' :
                    log.actionType.name() == 'STATUS_CHANGED' ? 'bg-purple-500' :
                    log.actionType.name() == 'PAYMENT_STATUS_CHANGED' ? 'bg-teal-500' :
                    log.actionType.name() == 'PROJECT_DELETED' ? 'bg-red-500' : 'bg-neutral-500'
                }">
            </div>
            
            <!-- Entry Card -->
            <div class="bg-white rounded-xl border border-neutral-200 shadow-sm hover:shadow-md transition-shadow overflow-hidden">
                <!-- Entry Header -->
                <div class="px-4 py-3 border-b border-neutral-100 bg-gradient-to-r from-neutral-50 to-white">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <!-- Action Icon -->
                            <span class="w-6 h-6 rounded-lg flex items-center justify-center"
                                th:classappend="${
                                    log.actionType.name() == 'PROJECT_CREATED' ? 'bg-emerald-100 text-emerald-600' :
                                    log.actionType.name() == 'PROJECT_UPDATED' ? 'bg-blue-100 text-blue-600' :
                                    log.actionType.name() == 'CONTRACTOR_ASSIGNED' ? 'bg-indigo-100 text-indigo-600' :
                                    log.actionType.name() == 'CONTRACTOR_UNASSIGNED' ? 'bg-amber-100 text-amber-600' :
                                    log.actionType.name() == 'STATUS_CHANGED' ? 'bg-purple-100 text-purple-600' :
                                    log.actionType.name() == 'PAYMENT_STATUS_CHANGED' ? 'bg-teal-100 text-teal-600' :
                                    log.actionType.name() == 'PROJECT_DELETED' ? 'bg-red-100 text-red-600' : 'bg-neutral-100 text-neutral-600'
                                }">
                                <!-- Created Icon -->
                                <svg th:if="${log.actionType.name() == 'PROJECT_CREATED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                <!-- Updated Icon -->
                                <svg th:if="${log.actionType.name() == 'PROJECT_UPDATED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                                <!-- Assigned Icon -->
                                <svg th:if="${log.actionType.name() == 'CONTRACTOR_ASSIGNED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                                </svg>
                                <!-- Unassigned Icon -->
                                <svg th:if="${log.actionType.name() == 'CONTRACTOR_UNASSIGNED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6"></path>
                                </svg>
                                <!-- Status Changed Icon -->
                                <svg th:if="${log.actionType.name() == 'STATUS_CHANGED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                                </svg>
                                <!-- Payment Changed Icon -->
                                <svg th:if="${log.actionType.name() == 'PAYMENT_STATUS_CHANGED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <!-- Deleted Icon -->
                                <svg th:if="${log.actionType.name() == 'PROJECT_DELETED'}" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </span>
                            <span class="text-sm font-bold text-neutral-700" th:text="${log.actionType.displayName}">Action</span>
                        </div>
                        <span class="text-[10px] font-medium text-neutral-400" th:text="${#temporals.format(log.timestamp, 'MMM dd, yyyy HH:mm')}">Date</span>
                    </div>
                </div>
                
                <!-- Entry Content -->
                <div class="px-4 py-3">
                    <!-- Admin Info -->
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center">
                            <span class="text-[10px] font-bold text-white" th:text="${#strings.substring(log.admin.username, 0, 1).toUpperCase()}">A</span>
                        </div>
                        <span class="text-xs font-semibold text-neutral-600" th:text="${log.admin.username}">admin</span>
                    </div>
                    
                    <!-- Old/New Values -->
                    <div th:if="${log.oldValue != null or log.newValue != null}" class="flex items-center gap-2 text-xs">
                        <div th:if="${log.oldValue != null}" class="flex items-center gap-1 px-2 py-1 bg-red-50 border border-red-100 rounded-lg">
                            <span class="text-neutral-400">From:</span>
                            <span class="font-semibold text-red-700" th:text="${log.oldValue}">old</span>
                        </div>
                        <svg th:if="${log.oldValue != null and log.newValue != null}" class="w-4 h-4 text-neutral-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                        <div th:if="${log.newValue != null}" class="flex items-center gap-1 px-2 py-1 bg-emerald-50 border border-emerald-100 rounded-lg">
                            <span class="text-neutral-400">To:</span>
                            <span class="font-semibold text-emerald-700" th:text="${log.newValue}">new</span>
                        </div>
                    </div>
                    
                    <!-- Details - Display field changes for updates -->
                    <div th:if="${log.details != null and !log.details.isEmpty()}" class="mt-2">
                        <!-- For PROJECT_UPDATED, display changes nicely -->
                        <div th:if="${log.actionType.name() == 'PROJECT_UPDATED'}" class="bg-neutral-50 rounded-lg p-2 border border-neutral-100">
                            <p class="text-[9px] font-bold text-neutral-400 uppercase tracking-wider mb-1.5">Changes Made:</p>
                            <p class="text-[10px] text-neutral-600 font-mono" th:text="${log.details}">Details</p>
                        </div>
                        <!-- For other action types, display details as-is -->
                        <p th:unless="${log.actionType.name() == 'PROJECT_UPDATED'}" class="text-[10px] text-neutral-400 font-medium" th:text="${log.details}">Details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
