<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Project Manager">
    
    <title>Admin Dashboard - Project Manager</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Touch-friendly controls */
        button, input, select, a.btn {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        input[type="text"], select {
            padding: 12px;
        }
        
        #install-btn {
            display: none;
        }
        
        /* Enhanced Desktop Responsiveness */
        @media (min-width: 1024px) {
            .desktop-container {
                max-width: 90rem;
            }
        }
        
        @media (min-width: 1536px) {
            .desktop-container {
                max-width: 100rem;
            }
        }
        
        /* Desktop Typography Scaling */
        @media (min-width: 1024px) {
            .desktop-scale-text {
                font-size: 1.125rem;
            }
        }
        
        @media (min-width: 1280px) {
            .desktop-scale-text {
                font-size: 1.25rem;
            }
        }
        
        @media (min-width: 1536px) {
            .desktop-scale-text {
                font-size: 1.375rem;
            }
        }
        
        /* Desktop Grid Enhancements */
        @media (min-width: 1024px) {
            .desktop-grid-gap {
                gap: 2.5rem;
            }
        }
        
        @media (min-width: 1280px) {
            .desktop-grid-gap {
                gap: 3rem;
            }
        }
        
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Install PWA Button -->
    <div id="install-btn" class="fixed top-4 right-4 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg cursor-pointer hover:bg-blue-700">
        Install App
    </div>
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-lg sm:text-xl font-semibold">Admin Dashboard</h1>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span sec:authentication="name" class="text-gray-700 text-sm sm:text-base"></span>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-red-600 hover:text-red-800 text-sm sm:text-base">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-4 sm:py-6 lg:py-8 px-4 sm:px-6 lg:px-8 xl:px-12">
        <div th:if="${success}" class="mb-4 p-3 sm:p-4 bg-green-100 border border-green-400 text-green-700 rounded text-sm sm:text-base">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="mb-4 p-3 sm:p-4 bg-red-100 border border-red-400 text-red-700 rounded text-sm sm:text-base">
            <span th:text="${error}"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 2xl:grid-cols-4 gap-4 sm:gap-6 lg:gap-8 mb-6 sm:mb-8 lg:mb-10">
            <a href="/admin/register-admin" class="group bg-blue-500 hover:bg-blue-600 text-white font-semibold py-4 px-6 lg:py-5 lg:px-8 xl:py-6 xl:px-10 rounded-lg text-center transition-colors duration-200 shadow-sm hover:shadow-md">
                <div class="flex items-center justify-center mb-2 lg:mb-3">
                    <svg class="w-6 h-6 lg:w-7 lg:h-7 xl:w-8 xl:h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M8 9a3 3 0 100-6 3 3 0 000 6zM8 11a6 6 0 016 6H2a6 6 0 016-6zM16 7a1 1 0 10-2 0v1h-1a1 1 0 100 2h1v1a1 1 0 102 0v-1h1a1 1 0 100-2h-1V7z"/>
                    </svg>
                </div>
                <span class="text-sm sm:text-base lg:text-lg xl:text-xl font-medium">Register Admin</span>
            </a>
            <a href="/admin/create-project" class="group bg-green-500 hover:bg-green-600 text-white font-semibold py-4 px-6 lg:py-5 lg:px-8 xl:py-6 xl:px-10 rounded-lg text-center transition-colors duration-200 shadow-sm hover:shadow-md">
                <div class="flex items-center justify-center mb-2 lg:mb-3">
                    <svg class="w-6 h-6 lg:w-7 lg:h-7 xl:w-8 xl:h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <span class="text-sm sm:text-base lg:text-lg xl:text-xl font-medium">Create Project</span>
            </a>
            <a href="/admin/create-contractor" class="group bg-purple-500 hover:bg-purple-600 text-white font-semibold py-4 px-6 lg:py-5 lg:px-8 xl:py-6 xl:px-10 rounded-lg text-center transition-colors duration-200 shadow-sm hover:shadow-md">
                <div class="flex items-center justify-center mb-2 lg:mb-3">
                    <svg class="w-6 h-6 lg:w-7 lg:h-7 xl:w-8 xl:h-8" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="text-sm sm:text-base lg:text-lg xl:text-xl font-medium">Create Contractor</span>
            </a>
        </div>

        <!-- Single Column Full Width Layout -->
        <div class="space-y-8 lg:space-y-12">
            <!-- Projects Section (Full Width) -->
            <div class="bg-white shadow-sm rounded-lg border border-gray-200 w-full">
                <div class="px-4 sm:px-6 lg:px-8 py-4 lg:py-6 border-b border-gray-200">
                    <h2 class="text-lg lg:text-xl xl:text-2xl font-semibold text-gray-900 flex items-center">
                        <svg class="w-5 h-5 lg:w-6 lg:h-6 xl:w-7 xl:h-7 mr-2 lg:mr-3 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2v1a2 2 0 002 2h4a2 2 0 002-2V3a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
                        </svg>
                        Projects
                    </h2>
                </div>
                
                <div class="p-4 sm:p-6 lg:p-8">
                    <!-- Project Search Bar -->
                    <form method="get" class="mb-6 lg:mb-8">
                        <input type="hidden" name="contractorSearch" th:value="${contractorSearch}">
                        <div class="flex flex-col sm:flex-row lg:flex-row gap-3 lg:gap-4">
                            <input type="text" name="projectSearch" th:value="${projectSearch}"
                                   placeholder="Search projects by work order, location, client code..."
                                   class="flex-1 px-4 py-3 lg:px-5 lg:py-4 xl:px-6 xl:py-4 border border-gray-300 rounded-lg text-sm lg:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[44px]">
                            <div class="flex gap-2 lg:gap-3">
                                <button type="submit" class="px-6 py-3 lg:px-8 lg:py-4 xl:px-10 xl:py-4 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm lg:text-base font-medium transition-colors duration-200 min-h-[44px] whitespace-nowrap">
                                    Search
                                </button>
                                <a href="/admin/dashboard" class="px-6 py-3 lg:px-8 lg:py-4 xl:px-10 xl:py-4 bg-gray-500 text-white rounded-lg hover:bg-gray-600 text-sm lg:text-base font-medium min-h-[44px] flex items-center justify-center transition-colors duration-200 whitespace-nowrap">
                                    Clear
                                </a>
                            </div>
                        </div>
                    </form>
                
                <div class="space-y-4">
                    <div th:each="project : ${projects}" class="border rounded p-3 sm:p-4">
                        <h3 class="font-medium text-sm sm:text-base" th:text="${project.workOrderNumber}"></h3>
                        <p class="text-xs sm:text-sm text-gray-600" th:text="${project.location}"></p>
                        <p class="text-xs sm:text-sm text-gray-600" th:text="${project.clientCode}"></p>
                        <p th:if="${project.description}" class="text-xs sm:text-sm text-gray-500 mt-1" th:text="${project.description}"></p>
                        
                        <!-- Show assigned contractors -->
                        <div class="mt-2">
                            <p class="text-xs font-medium text-gray-700">Assigned Contractors:</p>
                            <div class="flex flex-wrap gap-1 mt-1">
                                <span th:each="assignment : ${project.assignments}" 
                                      class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded"
                                      th:text="${assignment.contractor.fullName != null ? assignment.contractor.fullName : assignment.contractor.username}">
                                </span>
                                <span th:if="${#lists.isEmpty(project.assignments)}" class="text-xs text-gray-400">None assigned</span>
                            </div>
                        </div>
                        
                        <div class="mt-3 flex flex-col sm:flex-row gap-2">
                            <a th:href="@{'/admin/project/' + ${project.id} + '/photos'}" 
                               class="text-blue-600 hover:text-blue-800 text-xs sm:text-sm text-center sm:text-left">View Photos</a>
                        </div>
                        
                        <!-- Assign Contractor Form -->
                        <form th:action="@{/admin/assign-contractor}" method="post" class="mt-3">
                            <input type="hidden" name="projectId" th:value="${project.id}">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <select name="contractorId" class="text-xs sm:text-sm border rounded px-2 py-1 flex-1">
                                    <option value="">Select Contractor</option>
                                    <option th:each="contractor : ${contractors}" 
                                            th:value="${contractor.id}" 
                                            th:text="${contractor.fullName != null ? contractor.fullName + ' (' + contractor.username + ')' : contractor.username}"></option>
                                </select>
                                <button type="submit" class="text-xs sm:text-sm bg-gray-500 hover:bg-gray-700 text-white px-3 py-1 rounded whitespace-nowrap">
                                    Assign
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Contractors Section (Full Width) -->
            <div class="bg-white shadow-sm rounded-lg border border-gray-200 w-full">
                <div class="px-4 sm:px-6 lg:px-8 py-4 lg:py-6 border-b border-gray-200">
                    <h2 class="text-lg lg:text-xl xl:text-2xl font-semibold text-gray-900 flex items-center">
                        <svg class="w-5 h-5 lg:w-6 lg:h-6 xl:w-7 xl:h-7 mr-2 lg:mr-3 text-gray-500" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/>
                        </svg>
                        Contractors
                    </h2>
                </div>
                
                <div class="p-4 sm:p-6 lg:p-8">
                    <!-- Contractor Search Bar -->
                    <form method="get" class="mb-6 lg:mb-8">
                        <input type="hidden" name="projectSearch" th:value="${projectSearch}">
                        <div class="flex flex-col sm:flex-row lg:flex-row gap-3 lg:gap-4">
                            <input type="text" name="contractorSearch" th:value="${contractorSearch}"
                                   placeholder="Search contractors by name or username..."
                                   class="flex-1 px-4 py-3 lg:px-5 lg:py-4 xl:px-6 xl:py-4 border border-gray-300 rounded-lg text-sm lg:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[44px]">
                            <div class="flex gap-2 lg:gap-3">
                                <button type="submit" class="px-6 py-3 lg:px-8 lg:py-4 xl:px-10 xl:py-4 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm lg:text-base font-medium transition-colors duration-200 min-h-[44px] whitespace-nowrap">
                                    Search
                                </button>
                                <a href="/admin/dashboard" class="px-6 py-3 lg:px-8 lg:py-4 xl:px-10 xl:py-4 bg-gray-500 text-white rounded-lg hover:bg-gray-600 text-sm lg:text-base font-medium min-h-[44px] flex items-center justify-center transition-colors duration-200 whitespace-nowrap">
                                    Clear
                                </a>
                            </div>
                        </div>
                    </form>
                
                    <div class="space-y-4 lg:space-y-6">
                        <div th:each="contractor : ${contractors}" class="border border-gray-200 rounded-lg p-4 lg:p-6 hover:shadow-sm transition-shadow duration-200">
                            <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between">
                                <div class="flex-1">
                                    <h3 class="font-semibold text-base lg:text-lg text-gray-900 mb-2" th:text="${contractor.fullName != null ? contractor.fullName : contractor.username}"></h3>
                                    <div class="space-y-1 mb-4">
                                        <p class="text-sm text-gray-600 flex items-center">
                                            <svg class="w-4 h-4 mr-2 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                                                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
                                            </svg>
                                            <span th:text="'@' + ${contractor.username}"></span>
                                        </p>
                                        <p class="text-xs text-gray-500 flex items-center">
                                            <svg class="w-4 h-4 mr-2 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
                                            </svg>
                                            <span th:text="'Joined: ' + ${#temporals.format(contractor.createdAt, 'MMM dd, yyyy')}"></span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Show assigned projects -->
                            <div class="mt-4 pt-4 border-t border-gray-100">
                                <p class="text-sm font-medium text-gray-700 mb-3">Assigned Projects:</p>
                                <div class="flex flex-wrap gap-2">
                                    <span th:each="assignment : ${contractor.assignments}" 
                                          class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2v1a2 2 0 002 2h4a2 2 0 002-2V3a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" clip-rule="evenodd"/>
                                        </svg>
                                        <span th:text="${assignment.project.workOrderNumber}"></span>
                                    </span>
                                    <span th:if="${#lists.isEmpty(contractor.assignments)}" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-500">
                                        No projects assigned
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/pwa-register.js"></script>
</body>
</html>
