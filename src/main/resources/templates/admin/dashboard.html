<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Project Manager">
    
    <title>Admin Dashboard - Project Manager</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Touch-friendly controls */
        button, input, select, a.btn {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        input[type="text"], select {
            padding: 12px;
        }
        
        #install-btn {
            display: none;
        }
        
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Install PWA Button -->
    <div id="install-btn" class="fixed top-4 right-4 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg cursor-pointer hover:bg-blue-700">
        Install App
    </div>
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-lg sm:text-xl font-semibold">Admin Dashboard</h1>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span sec:authentication="name" class="text-gray-700 text-sm sm:text-base"></span>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="text-red-600 hover:text-red-800 text-sm sm:text-base">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-4 sm:py-6 px-4 sm:px-6 lg:px-8">
        <div th:if="${success}" class="mb-4 p-3 sm:p-4 bg-green-100 border border-green-400 text-green-700 rounded text-sm sm:text-base">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="mb-4 p-3 sm:p-4 bg-red-100 border border-red-400 text-red-700 rounded text-sm sm:text-base">
            <span th:text="${error}"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 mb-6 sm:mb-8">
            <a href="/admin/register-admin" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded text-center text-sm sm:text-base">
                Register Admin
            </a>
            <a href="/admin/create-project" class="bg-green-500 hover:bg-green-700 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded text-center text-sm sm:text-base">
                Create Project
            </a>
            <a href="/admin/create-contractor" class="bg-purple-500 hover:bg-purple-700 text-white font-bold py-3 sm:py-4 px-4 sm:px-6 rounded text-center text-sm sm:text-base">
                Create Contractor
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8">
            <!-- Projects -->
            <div class="bg-white shadow rounded-lg p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4">
                    <h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-0">Projects</h2>
                </div>
                
                <!-- Project Search Bar -->
                <form method="get" class="mb-4">
                    <input type="hidden" name="contractorSearch" th:value="${contractorSearch}">
                    <div class="flex gap-2">
                        <input type="text" name="projectSearch" th:value="${projectSearch}"
                               placeholder="Search projects by work order, location, client code..."
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                        <button type="submit" class="px-6 py-3 bg-blue-500 text-white rounded-md hover:bg-blue-600 text-sm min-h-[44px]">
                            Search
                        </button>
                        <a href="/admin/dashboard" class="px-6 py-3 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm min-h-[44px] flex items-center">
                            Clear
                        </a>
                    </div>
                </form>
                
                <div class="space-y-4">
                    <div th:each="project : ${projects}" class="border rounded p-3 sm:p-4">
                        <h3 class="font-medium text-sm sm:text-base" th:text="${project.workOrderNumber}"></h3>
                        <p class="text-xs sm:text-sm text-gray-600" th:text="${project.location}"></p>
                        <p class="text-xs sm:text-sm text-gray-600" th:text="${project.clientCode}"></p>
                        <p th:if="${project.description}" class="text-xs sm:text-sm text-gray-500 mt-1" th:text="${project.description}"></p>
                        
                        <!-- Show assigned contractors -->
                        <div class="mt-2">
                            <p class="text-xs font-medium text-gray-700">Assigned Contractors:</p>
                            <div class="flex flex-wrap gap-1 mt-1">
                                <span th:each="assignment : ${project.assignments}" 
                                      class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded"
                                      th:text="${assignment.contractor.fullName != null ? assignment.contractor.fullName : assignment.contractor.username}">
                                </span>
                                <span th:if="${#lists.isEmpty(project.assignments)}" class="text-xs text-gray-400">None assigned</span>
                            </div>
                        </div>
                        
                        <div class="mt-3 flex flex-col sm:flex-row gap-2">
                            <a th:href="@{'/admin/project/' + ${project.id} + '/photos'}" 
                               class="text-blue-600 hover:text-blue-800 text-xs sm:text-sm text-center sm:text-left">View Photos</a>
                        </div>
                        
                        <!-- Assign Contractor Form -->
                        <form th:action="@{/admin/assign-contractor}" method="post" class="mt-3">
                            <input type="hidden" name="projectId" th:value="${project.id}">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <select name="contractorId" class="text-xs sm:text-sm border rounded px-2 py-1 flex-1">
                                    <option value="">Select Contractor</option>
                                    <option th:each="contractor : ${contractors}" 
                                            th:value="${contractor.id}" 
                                            th:text="${contractor.fullName != null ? contractor.fullName + ' (' + contractor.username + ')' : contractor.username}"></option>
                                </select>
                                <button type="submit" class="text-xs sm:text-sm bg-gray-500 hover:bg-gray-700 text-white px-3 py-1 rounded whitespace-nowrap">
                                    Assign
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Contractors -->
            <div class="bg-white shadow rounded-lg p-4 sm:p-6">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4">
                    <h2 class="text-base sm:text-lg font-semibold mb-2 sm:mb-0">Contractors</h2>
                </div>
                
                <!-- Contractor Search Bar -->
                <form method="get" class="mb-4">
                    <input type="hidden" name="projectSearch" th:value="${projectSearch}">
                    <div class="flex gap-2">
                        <input type="text" name="contractorSearch" th:value="${contractorSearch}"
                               placeholder="Search contractors by name or username..."
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[44px]">
                        <button type="submit" class="px-6 py-3 bg-blue-500 text-white rounded-md hover:bg-blue-600 text-sm min-h-[44px]">
                            Search
                        </button>
                        <a href="/admin/dashboard" class="px-6 py-3 bg-gray-500 text-white rounded-md hover:bg-gray-600 text-sm min-h-[44px] flex items-center">
                            Clear
                        </a>
                    </div>
                </form>
                
                <div class="space-y-3">
                    <div th:each="contractor : ${contractors}" class="border rounded p-3">
                        <p class="font-medium text-sm sm:text-base" th:text="${contractor.fullName != null ? contractor.fullName : contractor.username}"></p>
                        <p class="text-xs text-gray-600" th:text="'@' + ${contractor.username}"></p>
                        <p class="text-xs text-gray-500" th:text="${#temporals.format(contractor.createdAt, 'yyyy-MM-dd')}"></p>
                        
                        <!-- Show assigned projects -->
                        <div class="mt-2">
                            <p class="text-xs font-medium text-gray-700">Assigned Projects:</p>
                            <div class="flex flex-wrap gap-1 mt-1">
                                <span th:each="assignment : ${contractor.assignments}" 
                                      class="inline-block bg-green-100 text-green-800 text-xs px-2 py-1 rounded"
                                      th:text="${assignment.project.workOrderNumber}">
                                </span>
                                <span th:if="${#lists.isEmpty(contractor.assignments)}" class="text-xs text-gray-400">No projects assigned</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/pwa-register.js"></script>
</body>
</html>
