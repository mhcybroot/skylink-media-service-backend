<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <title>Create Project - Project Manager</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        input, textarea, button {
            min-height: 44px;
            touch-action: manipulation;
        }
        
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <div class="bg-white shadow-lg rounded-lg border border-gray-200">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-xl font-semibold text-gray-900 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                        </svg>
                        Create New Project
                    </h2>
                </div>
            
            <form th:action="@{/admin/create-project}" method="post" class="space-y-4">
                <div>
                    <label for="workOrderNumber" class="block text-sm font-medium text-gray-700">Work Order Number</label>
                    <input type="text" id="workOrderNumber" name="workOrderNumber" required 
                           class="mt-1 block w-full px-3 py-2 sm:py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                </div>
                
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700">Location</label>
                    <input type="text" id="location" name="location" required 
                           class="mt-1 block w-full px-3 py-2 sm:py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                </div>
                
                <div>
                    <label for="clientCode" class="block text-sm font-medium text-gray-700">Client Code</label>
                    <input type="text" id="clientCode" name="clientCode" required 
                           class="mt-1 block w-full px-3 py-2 sm:py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm">
                </div>
                
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" name="description" rows="3"
                              class="mt-1 block w-full px-3 py-2 sm:py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-base sm:text-sm"
                              placeholder="Optional project description"></textarea>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 pt-4">
                    <button type="submit" 
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-base sm:text-sm">
                        Create Project
                    </button>
                    <a href="/admin/dashboard" 
                       class="flex-1 bg-gray-500 hover:bg-gray-700 text-white font-bold py-3 sm:py-2 px-4 rounded text-center text-base sm:text-sm">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
