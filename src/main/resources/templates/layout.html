<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0284c7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Project Manager">
    
    <title th:text="${pageTitle} ?: 'Project Manager'">Project Manager</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <style>
        /* Ensure minimum touch target size */
        button, input[type="submit"], input[type="button"], .btn {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* Touch-friendly form inputs */
        input[type="text"], input[type="password"], input[type="email"], 
        input[type="file"], select, textarea {
            min-height: 44px;
            padding: 12px;
        }
        
        /* Install button */
        #install-btn {
            display: none;
        }
        
        /* PWA specific styles */
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
    
    <!-- Additional head content -->
    <th:block th:fragment="head-extra"></th:block>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Install PWA Button (hidden by default) -->
    <div id="install-btn" class="fixed top-4 right-4 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg cursor-pointer hover:bg-blue-700">
        Install App
    </div>
    
    <!-- Main content -->
    <div th:fragment="content">
        <!-- Content will be replaced by extending templates -->
    </div>
    
    <!-- PWA Registration Script -->
    <script src="/js/pwa-register.js"></script>
    
    <!-- Additional scripts -->
    <th:block th:fragment="scripts-extra"></th:block>
</body>
</html>
